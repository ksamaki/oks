name: Publish NuGet Packages

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup package version
        shell: bash
        run: |
          BASE_VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "PACKAGE_VERSION=${BASE_VERSION}-ci.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Configure GitHub Packages source
        run: |
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/ksamaki/index.json"

      - name: Restore
        run: dotnet restore src/Oks/Oks.slnx

      - name: Build
        run: dotnet build src/Oks/Oks.slnx --configuration Release --no-restore -p:ContinuousIntegrationBuild=true -p:Version=${{ env.PACKAGE_VERSION }}

      - name: Pack
        run: dotnet pack src/Oks/Oks.slnx --configuration Release --no-build -p:PackageVersion=${{ env.PACKAGE_VERSION }} --output ./artifacts/packages

      - name: Publish to GitHub Packages
        run: dotnet nuget push "./artifacts/packages/*.nupkg" --source "github" --api-key "${{ secrets.GITHUB_TOKEN }}" --skip-duplicate
